<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Fey Not Absan Lasanble Flacq</title>
  <link rel="stylesheet" href="styles.css?v=20260610-4" />
</head>
<body>
  <main class="app">
    <section id="home" class="screen active" aria-label="Accueil">
      <header class="home-header">
        <div>
          <h1>Swazir to teritwar</h1>
          <p class="subtitle">565 teritwar</p>
          <p id="progress" class="muted">0 teritwar renseigné</p>
        </div>
        <input id="search" type="search" placeholder="Rechercher..." autocomplete="off" />
      </header>
      <div id="territoryGrid" class="territory-grid"></div>
    </section>

    <section id="detail" class="screen" aria-label="Fiche territoire">
      <header class="detail-header">
        <button id="backBtn" class="back-btn" type="button">← Accueil</button>
        <div>
          <h1>Fey Not Absan Lasanble Flacq</h1>
          <p id="territoryTitle" class="subtitle">Teritwar</p>
        </div>
      </header>

      <section class="meta-card">
        <label>Nimero Teritwar
          <input id="territoryNumber" type="text" readonly />
        </label>
        <label>Blok
          <input id="blok" type="text" placeholder="Blok" />
        </label>
        <label>Proklamater
          <input id="proklamater" type="text" placeholder="Nom proklamater" />
        </label>
      </section>

      <section class="table-card">
        <div class="table-head">
          <h2>Renseignements lakaz</h2>
          <button id="addRowBtn" class="primary" type="button">+ Ajouter Lakaz</button>
        </div>
        <div class="rows-title desktop-only">
          <span class="col-lakaz">Lakaz</span>
          <span class="col-status">Absan</span>
          <span class="col-status">Prezan</span>
          <span class="col-status nepli-title">Nepli Vizite</span>
          <span class="col-detail">Bann Detay</span>
          <span class="col-date">Dat</span>
          <span class="col-actions"></span>
        </div>
        <div id="rows"></div>
      </section>
    </section>
  </main>

  <script src="polygons.js?v=20260610-4"></script>
  <script src="app.js?v=20260610-4"></script>
</body>
</html>
